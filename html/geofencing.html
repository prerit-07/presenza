<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Presenza - Geofence Zones</title>
<link rel="icon" type="image/svg+xml" href="../images/presenza-logo.svg">
<link rel="stylesheet" href="../css/theme.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Sora:wght@600;700;800&display=swap" rel="stylesheet">
</head>
<body data-role="organization" data-page="geofencing" data-title="Geofence Zones" data-subtitle="Define the physical boundaries where check-in is allowed">

<main>
  <div class="ps-section-head">
    <div class="ps-section-title" id="zoneCount">0 zones configured</div>
    <button class="ps-btn ps-btn-primary" id="addZoneBtn">Add zone</button>
  </div>

  <div class="geo-map-card ps-card">
    <div class="geo-map-wrap" id="geoMapWrap">
      <div id="geoMainMap" class="geo-map-img"></div>
      <div class="geo-map-tint"></div>
      <div class="geo-map-glow"></div>
      <div class="geo-map-radar"></div>
    </div>
    <div class="geo-map-caption">Live geofence overview — drag a pin to reposition its zone</div>
  </div>

  <div class="ps-stat-grid" id="zoneGrid" style="grid-template-columns: repeat(2, 1fr);"></div>
</main>

<style>
  .geo-map-card { margin-bottom: 24px; }
  .geo-map-wrap {
    position: relative;
    height: 420px;
    border-radius: var(--radius-lg);
    overflow: hidden;
    background: radial-gradient(circle at 30% 20%, #241454 0%, #150a33 55%, #0d0621 100%);
    box-shadow: var(--shadow-lg);
    perspective: 900px;
    cursor: crosshair;
    transition: transform 0.15s ease-out;
    transform-style: preserve-3d;
  }
  .geo-map-img {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    filter: saturate(0.8) brightness(0.72) contrast(1.05);
  }
  .geo-map-img .leaflet-control-attribution { font-size: 8px; opacity: 0.5; background: transparent; color: #fff; }
  .geo-map-img .leaflet-control-attribution a { color: rgba(255,255,255,0.7); }
  .geo-map-tint {
    position: absolute; inset: 0;
    background: linear-gradient(160deg, rgba(58,31,140,0.5) 0%, rgba(13,6,33,0.72) 100%);
    pointer-events: none;
  }
  .geo-map-glow {
    position: absolute; inset: 0;
    background: radial-gradient(circle at 50% 38%, rgba(34,211,201,0.18), transparent 60%);
    pointer-events: none;
  }
  .geo-map-radar {
    position: absolute; inset: -10%;
    background: conic-gradient(from 0deg, rgba(34,211,201,0.22), transparent 22%);
    animation: geo-radar-spin 5.5s linear infinite;
    mix-blend-mode: screen;
    pointer-events: none;
  }
  @keyframes geo-radar-spin { to { transform: rotate(360deg); } }

  /* Real, draggable Leaflet zone marker — a glowing blue "you can move me" dot */
  .geo-live-pin {
    position: relative;
    width: 22px; height: 22px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, #60a5fa, #2563eb 70%);
    border: 3px solid #fff;
    box-shadow: 0 0 0 6px rgba(37,99,235,0.22), 0 3px 10px rgba(0,0,0,0.4);
    cursor: grab;
    transition: transform 0.15s ease;
  }
  .geo-live-pin:active { cursor: grabbing; transform: scale(1.12); }
  .geo-live-pin-ring {
    position: absolute; inset: -8px;
    border-radius: 50%;
    background: rgba(37,99,235,0.35);
    animation: geo-pin-ping 2.2s cubic-bezier(0,0,0.2,1) infinite;
    pointer-events: none;
  }
  @keyframes geo-pin-ping {
    0% { transform: scale(0.6); opacity: 0.8; }
    75%, 100% { transform: scale(2.2); opacity: 0; }
  }
  .geo-live-pin-core {
    position: absolute; inset: 6px;
    border-radius: 50%;
    background: rgba(255,255,255,0.85);
    pointer-events: none;
  }
  .leaflet-tooltip.leaflet-tooltip-top { font-weight: 700; font-size: 11.5px; }

  .geo-map-caption {
    text-align: center; font-size: 12px; font-weight: 600;
    color: var(--text-400); padding: 12px 0 4px;
  }

  .zone-card { position: relative; }
  .zone-card-top { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
  .zone-map-icon {
    width: 40px; height: 40px; border-radius: 11px;
    background: linear-gradient(135deg, var(--accent-500), var(--brand-400));
    color: #fff; display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .zone-name { font-family: var(--font-heading); font-weight: 700; font-size: 15.5px; color: #fff; }
  .zone-detail-row { display:flex; justify-content: space-between; font-size: 12.5px; padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.14); color: rgba(255,255,255,0.7); font-weight: 600; }
  .zone-detail-row:last-child { border-bottom: none; }
  .zone-detail-row b { color: #fff; }
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="../js/icons.js"></script>
<script src="../js/data.js"></script>
<script src="../js/shell.js"></script>
<script src="../js/geofencing.js"></script>
</body>
</html>
