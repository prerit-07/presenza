<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Presenza - Team</title>
<link rel="icon" type="image/svg+xml" href="../images/presenza-logo.svg">
<link rel="stylesheet" href="../css/theme.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Sora:wght@600;700;800&display=swap" rel="stylesheet">
</head>
<body data-role="manager" data-page="team" data-title="Team" data-subtitle="Your team's roster and attendance at a glance">

<main>
  <div class="ps-stat-grid" style="grid-template-columns: repeat(3, 1fr);">
    <div class="ps-stat-card">
      <div class="ps-stat-icon" id="iconTeamSize"></div>
      <div class="ps-stat-value" id="statTeamSize">0</div>
      <div class="ps-stat-label">Team members</div>
    </div>
    <div class="ps-stat-card">
      <div class="ps-stat-icon" id="iconTeamActive"></div>
      <div class="ps-stat-value" id="statTeamActive">0</div>
      <div class="ps-stat-label">Active today</div>
    </div>
    <div class="ps-stat-card">
      <div class="ps-stat-icon" id="iconTeamAvg"></div>
      <div class="ps-stat-value" id="statTeamAvg">0%</div>
      <div class="ps-stat-label">Avg. attendance</div>
    </div>
  </div>

  <div class="ps-card">
    <div class="ps-section-head">
      <div class="ps-section-title">Team roster</div>
    </div>
    <div class="team-roster-grid" id="teamRoster"></div>
  </div>
</main>

<style>
  .team-roster-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
  .team-roster-card {
    background: linear-gradient(155deg, var(--brand-500) 0%, var(--brand-700) 100%);
    border: none;
    border-radius: var(--radius-md);
    padding: 18px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    box-shadow: 0 8px 20px rgba(41,24,92,0.22);
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }
  .team-roster-card:hover { transform: translateY(-3px); box-shadow: 0 12px 26px rgba(41,24,92,0.3); }
  .team-roster-top { display: flex; align-items: center; gap: 12px; }
  .team-roster-avatar {
    width: 42px; height: 42px; border-radius: 50%;
    background: rgba(255,255,255,0.18); color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 14px; flex-shrink: 0;
  }
  .team-roster-name { font-weight: 700; font-size: 14px; color: #fff; }
  .team-roster-role { font-size: 12px; color: rgba(255,255,255,0.65); font-weight: 600; }
  .team-roster-bar-track { height: 6px; border-radius: 999px; background: rgba(255,255,255,0.18); overflow: hidden; }
  .team-roster-bar-fill { height: 100%; background: #fff; border-radius: 999px; }
  .team-roster-bottom { display: flex; align-items: center; justify-content: space-between; font-size: 11.5px; font-weight: 700; color: rgba(255,255,255,0.75); }

  @media (max-width: 980px) {
    .team-roster-grid { grid-template-columns: repeat(2, 1fr); }
  }
  @media (max-width: 600px) {
    .team-roster-grid { grid-template-columns: 1fr; }
  }
</style>

<script src="../js/icons.js"></script>
<script src="../js/data.js"></script>
<script src="../js/shell.js"></script>
<script src="../js/manager-team.js"></script>
</body>
</html>
