<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Presenza - Organisation Setup</title>
<link rel="icon" type="image/svg+xml" href="../images/presenza-logo.svg">
<link rel="stylesheet" href="../css/theme.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Sora:wght@600;700;800&display=swap" rel="stylesheet">
</head>
<body data-role="organization" data-page="setup" data-title="Organisation Setup" data-subtitle="Manage your organization profile and subscription">

<main>
  <div class="ps-card" style="margin-bottom: 22px;">
    <div class="ps-alert ps-alert-error" id="profileError"></div>

    <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 20px 30px;">
      <div class="ps-field">
        <label>Organization Name</label>
        <input type="text" id="fieldName">
      </div>
      <div class="ps-field">
        <label>Domain Type</label>
        <input type="text" id="fieldDomain">
      </div>
      <div class="ps-field">
        <label>Email Address</label>
        <input type="text" id="fieldEmail">
      </div>
      <div class="ps-field">
        <label>Timezone</label>
        <input type="text" id="fieldTimezone">
      </div>
    </div>

    <div style="display:flex; align-items:center; gap:16px; margin-top: 6px;">
      <button class="ps-btn ps-btn-primary" id="saveProfileBtn">Save Changes</button>
      <span id="saveConfirm" style="display:none; color: var(--success-500); font-weight:700; font-size: 13px;">Saved successfully</span>
    </div>
  </div>

  <div class="ps-section-head">
    <div class="ps-section-title">Subscription Plan</div>
  </div>

  <div style="display:grid; grid-template-columns: repeat(3, 1fr); gap: 18px;" id="planGrid">
    <div class="ps-card plan-option" data-plan="FREE" style="cursor:pointer; text-align:center;">
      <div class="plan-name">FREE</div>
      <div class="plan-desc">upto 25 members</div>
    </div>
    <div class="ps-card plan-option" data-plan="STANDARD" style="cursor:pointer; text-align:center;">
      <div class="plan-name">STANDARD</div>
      <div class="plan-desc">upto 200 members</div>
    </div>
    <div class="ps-card plan-option" data-plan="ENTERPRISE" style="cursor:pointer; text-align:center;">
      <div class="plan-name">ENTERPRISE</div>
      <div class="plan-desc">upto 1000 members</div>
    </div>
  </div>
</main>

<style>
  .plan-option { position: relative; transition: box-shadow 0.15s ease, border-color 0.15s ease; }
  .plan-option:hover { box-shadow: var(--shadow-md); }
  .plan-option.current { border: 2px solid var(--brand-500); box-shadow: var(--shadow-glow); }
  .plan-name { font-family: var(--font-heading); font-size: 19px; font-weight: 800; color: var(--text-900); margin-bottom: 6px; }
  .plan-desc { font-size: 12.5px; color: var(--text-500); font-weight: 600; }
  .plan-badge {
    position: absolute; top: -11px; left: 50%; transform: translateX(-50%);
    background: var(--gradient-brand); color: #fff; font-size: 10.5px; font-weight: 700;
    padding: 4px 12px; border-radius: var(--radius-pill);
  }
</style>

<script src="../js/icons.js"></script>
<script src="../js/data.js"></script>
<script src="../js/shell.js"></script>
<script src="../js/profile.js"></script>
</body>
</html>
