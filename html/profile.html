<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Presenza - Organisation Setup</title>
<link rel="icon" type="image/svg+xml" href="../images/presenza-logo.svg">
<link rel="stylesheet" href="../css/theme.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Sora:wght@600;700;800&display=swap" rel="stylesheet">
</head>
<body data-role="organization" data-page="setup" data-title="Organisation Setup" data-subtitle="Live organization profile and subscription">

<main>
  <div id="appConnBanner" class="ps-card" style="margin-bottom:18px; font-size:13.5px; font-weight:600;">Connecting…</div>

  <div class="ps-section-head">
    <div class="ps-section-title">Organization Profile</div>
  </div>
  <div id="orgProfileBody" class="ps-card" style="margin-bottom: 22px;">Loading…</div>

  <div class="ps-section-head">
    <div class="ps-section-title">Subscription Plan</div>
  </div>
  <div id="orgPlanBody" class="ps-card" style="margin-bottom: 22px;">Loading…</div>

  <div class="ps-section-head">
    <div class="ps-section-title">Presence Settings</div>
  </div>
  <div id="presenceSettingsBody" class="ps-card" style="margin-bottom: 22px;">Loading…</div>
</main>

<style>
  .plan-option { position: relative; transition: box-shadow 0.15s ease, border-color 0.15s ease; }
  .plan-option:hover { box-shadow: var(--shadow-md); }
  .plan-option.current { border: 2px solid var(--brand-500); box-shadow: var(--shadow-glow); }
  .plan-name { font-family: var(--font-heading); font-size: 19px; font-weight: 800; color: var(--text-900); margin-bottom: 6px; }
  .plan-desc { font-size: 12.5px; color: var(--text-500); font-weight: 600; }
  .plan-badge {
    position: absolute; top: -11px; left: 50%; transform: translateX(-50%);
    background: var(--gradient-brand); color: #fff; font-size: 10.5px; font-weight: 700;
    padding: 4px 12px; border-radius: var(--radius-pill);
  }
</style>

<script src="../js/icons.js"></script>
<script src="../js/data.js"></script>
<script src="../js/shell.js"></script>
<script src="../js/app-data.js"></script>
<script src="../js/profile.js"></script>
</body>
</html>
