<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Presenza - Attendance Record</title>
<link rel="icon" type="image/svg+xml" href="../images/presenza-logo.svg">
<link rel="stylesheet" href="../css/theme.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Sora:wght@600;700;800&display=swap" rel="stylesheet">
</head>
<body data-role="organization" data-roles="organization,manager" data-page="attendance" data-title="Attendance Record" data-subtitle="Live from the app — add manual entries and corrections">

<main>
  <div id="appConnBanner" class="ps-card" style="margin-bottom:18px; font-size:13.5px; font-weight:600;">Connecting…</div>

  <div class="ps-card attendance-filter-bar">
    <select class="attendance-filter-select" id="statusFilter">
      <option>All status</option>
      <option>Present</option>
      <option>Absent</option>
      <option>Late</option>
      <option>Pending</option>
      <option>Rejected</option>
    </select>
    <button class="ps-btn ps-btn-primary" id="addManualBtn">Add manual entry</button>
    <button class="ps-btn ps-btn-primary attendance-export-btn" id="exportBtn">Export CSV</button>
  </div>

  <div class="ps-table-wrap">
    <table class="ps-table">
      <thead>
        <tr>
          <th>Name</th>
          <th>Check-In</th>
          <th>Effective Check-In</th>
          <th>WiFi</th>
          <th>Status</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="attendanceBody"><tr><td colspan="6" class="ps-empty">Loading…</td></tr></tbody>
    </table>
  </div>
</main>

<style>
  .attendance-filter-bar {
    margin-bottom: 18px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }
  .attendance-filter-select {
    padding: 10px 16px;
    border-radius: var(--radius-pill);
    border: 1px solid var(--surface-border);
    background: var(--surface-100);
    color: var(--text-700);
    font-weight: 700;
    font-size: 13px;
    font-family: var(--font-body);
    cursor: pointer;
  }
  .attendance-filter-select:focus { outline: none; border-color: var(--brand-400); }
  .attendance-export-btn { margin-left: auto; }
</style>

<script src="../js/icons.js"></script>
<script src="../js/data.js"></script>
<script src="../js/shell.js"></script>
<script src="../js/app-data.js"></script>
<script src="../js/attendance.js"></script>
</body>
</html>
