<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Presenza - Members</title>
<link rel="icon" type="image/svg+xml" href="../images/presenza-logo.svg">
<link rel="stylesheet" href="../css/theme.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Sora:wght@600;700;800&display=swap" rel="stylesheet">
</head>
<body data-role="organization" data-page="members" data-title="Members" data-subtitle="Everyone who has joined your organization">

<main>
  <div class="ps-table-wrap" style="margin-bottom: 20px;">
    <table class="ps-table">
      <thead>
        <tr>
          <th>Name</th>
          <th>Email Address</th>
          <th>Joined Via</th>
          <th>Status</th>
          <th>Role</th>
        </tr>
      </thead>
      <tbody id="membersTableBody"></tbody>
    </table>
  </div>

  <div style="display:flex; justify-content:flex-end; gap:10px;">
    <input type="file" id="importFileInput" accept=".csv,text/csv" style="display:none;">
    <button class="ps-btn ps-btn-ghost" id="importMembersBtn">Import CSV</button>
    <button class="ps-btn ps-btn-primary" id="addMemberBtn">Add member</button>
  </div>
</main>

<script src="../js/icons.js"></script>
<script src="../js/data.js"></script>
<script src="../js/shell.js"></script>
<script src="../js/members.js"></script>
</body>
</html>
