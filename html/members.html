<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Presenza - Members</title>
<link rel="icon" type="image/svg+xml" href="../images/presenza-logo.svg">
<link rel="stylesheet" href="../css/theme.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Sora:wght@600;700;800&display=swap" rel="stylesheet">
</head>
<body data-role="organization" data-page="members" data-title="Members" data-subtitle="Live employee list from the app">

<main>
  <div id="appConnBanner" class="ps-card" style="margin-bottom:18px; font-size:13.5px; font-weight:600;">Connecting…</div>

  <div class="ps-section-head">
    <div class="ps-section-title">Employees</div>
    <button class="ps-btn ps-btn-primary" id="addEmployeeBtn">Add employee</button>
  </div>

  <div class="ps-table-wrap" style="margin-bottom: 20px;">
    <table class="ps-table">
      <thead>
        <tr>
          <th>Name</th>
          <th>Employee ID</th>
          <th>Date of Joining</th>
          <th>Department</th>
          <th>Shift</th>
          <th>Team</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="membersTableBody"><tr><td colspan="7" class="ps-empty">Loading…</td></tr></tbody>
    </table>
  </div>
</main>

<script src="../js/icons.js"></script>
<script src="../js/data.js"></script>
<script src="../js/shell.js"></script>
<script src="../js/app-data.js"></script>
<script src="../js/members.js"></script>
</body>
</html>
