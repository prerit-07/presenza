<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Presenza - Support Tickets</title>
<link rel="icon" type="image/svg+xml" href="../images/presenza-logo.svg">
<link rel="stylesheet" href="../css/theme.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Sora:wght@600;700;800&display=swap" rel="stylesheet">
</head>
<body data-role="organization" data-roles="organization,manager" data-page="support-tickets" data-title="Support Tickets" data-subtitle="Live from the app — comment, assign, and update status">

<main>
  <div id="appConnBanner" class="ps-card" style="margin-bottom:18px; font-size:13.5px; font-weight:600;">Connecting…</div>

  <div class="ps-section-head">
    <div class="ps-section-title">Organization tickets</div>
  </div>
  <div id="orgTicketsBody" style="display:flex; flex-direction:column; gap:14px; margin-bottom: 24px;">Loading…</div>

  <div class="ps-section-head">
    <div class="ps-section-title">My tickets</div>
  </div>
  <div id="myTicketsBody" style="display:flex; flex-direction:column; gap:14px;">Loading…</div>
</main>

<style>
  .ticket-card {
    background: var(--surface-100); border: 1px solid var(--surface-border);
    border-radius: var(--radius-lg); padding: 16px 20px;
  }
  .ticket-top { display:flex; align-items:center; justify-content:space-between; margin-bottom: 8px; flex-wrap: wrap; gap: 8px; }
  .ticket-subject { font-weight: 700; font-size: 14px; color: var(--text-900); }
  .ticket-desc { font-size: 12.5px; color: var(--text-500); font-weight: 500; line-height: 1.6; }
  .ticket-time { text-align:right; font-size: 11px; color: var(--text-400); font-weight:600; margin-top: 8px; }
</style>

<script src="../js/icons.js"></script>
<script src="../js/data.js"></script>
<script src="../js/shell.js"></script>
<script src="../js/app-data.js"></script>
<script src="../js/app-tickets.js"></script>
</body>
</html>
