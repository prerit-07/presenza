<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Presenza App Backend — Health Check</title>
<style>
  body { font-family: -apple-system, Arial, sans-serif; background: #0f0f14; color: #eee; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
  .card { background: #1a1a22; border-radius: 16px; padding: 32px 40px; text-align: center; min-width: 320px; }
  h1 { font-size: 18px; margin: 0 0 20px; }
  .status { font-size: 15px; font-weight: 700; padding: 10px 18px; border-radius: 999px; display: inline-block; margin-bottom: 14px; }
  .up { background: rgba(34,197,94,0.15); color: #4ade80; }
  .down { background: rgba(239,68,68,0.15); color: #f87171; }
  .checking { background: rgba(255,255,255,0.1); color: #ccc; }
  pre { text-align: left; background: #0f0f14; padding: 12px; border-radius: 8px; font-size: 12px; overflow: auto; max-width: 500px; }
  button { margin-top: 16px; padding: 8px 18px; border-radius: 8px; border: none; background: #6d28d9; color: white; font-weight: 600; cursor: pointer; }
</style>
</head>
<body>
<div class="card">
  <h1>App Backend Health Check</h1>
  <div id="statusChip" class="status checking">Checking…</div>
  <pre id="responseBody">—</pre>
  <div id="timestamp" style="font-size: 11px; color: #888; margin-top: 10px;"></div>
  <button id="recheckBtn">Check again</button>
</div>

<script>
  const API_BASE = 'https://presenza-backend-sumit-hugqdzfwfxeybngu.centralindia-01.azurewebsites.net';
  const chip = document.getElementById('statusChip');
  const body = document.getElementById('responseBody');
  const ts = document.getElementById('timestamp');

  async function check() {
    chip.className = 'status checking';
    chip.textContent = 'Checking…';
    body.textContent = '—';

    try {
      const res = await fetch(API_BASE + '/actuator/health');
      const text = await res.text();
      let parsed;
      try { parsed = JSON.parse(text); } catch (e) { parsed = text; }

      if (res.ok) {
        chip.className = 'status up';
        chip.textContent = 'UP (' + res.status + ')';
      } else {
        chip.className = 'status down';
        chip.textContent = 'DOWN (' + res.status + ')';
      }
      body.textContent = typeof parsed === 'string' ? parsed : JSON.stringify(parsed, null, 2);
    } catch (err) {
      chip.className = 'status down';
      chip.textContent = 'UNREACHABLE';
      body.textContent = err.message;
    }
    ts.textContent = 'Last checked: ' + new Date().toLocaleTimeString();
  }

  document.getElementById('recheckBtn').addEventListener('click', check);
  check();
</script>
</body>
</html>
